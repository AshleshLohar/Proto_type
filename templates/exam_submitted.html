<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Submitted — ProctorAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .success-icon {
            width: 90px;
            height: 90px;
            background: rgba(16, 185, 129, 0.12);
            border: 2px solid rgba(16, 185, 129, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 28px;
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        .success-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 50px 40px;
            max-width: 520px;
            margin: 0 auto;
            text-align: center;
            box-shadow: var(--shadow-card);
            animation: cardSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .success-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #10b981, #34d399, #6ee7b7);
        }

        .success-title {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .success-message {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .success-details {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 18px 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .detail-row:not(:last-child) {
            border-bottom: 1px solid rgba(99, 102, 241, 0.08);
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .detail-value {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .success-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .success-actions .btn {
            padding: 14px 32px;
            width: auto;
        }

        /* Confetti-like particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: fall linear forwards;
            opacity: 0;
        }

        @keyframes fall {
            0% { opacity: 1; transform: translateY(-20px) rotate(0deg); }
            100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
        }
    </style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="particles" id="particles"></div>

<nav class="navbar">
    <a href="/" class="navbar-brand">
        <span class="brand-icon">🛡️</span>
        ProctorAI
    </a>
    <div class="navbar-links">
        <a href="/student/dashboard">Dashboard</a>
        <a href="/">Logout</a>
    </div>
</nav>

<div class="page-wrapper">
    <div class="success-card">
        <div class="success-icon">✅</div>
        <h1 class="success-title">Exam Submitted!</h1>
        <p class="success-message">
            Your answers have been recorded successfully. You may now close this window or return to your dashboard.
        </p>

        <div class="success-details">
            <div class="detail-row">
                <span class="detail-label">Exam</span>
                <span class="detail-value">AI & ML Examination</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Status</span>
                <span class="detail-value" style="color: #10b981;">✓ Submitted</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Submitted At</span>
                <span class="detail-value" id="submit-time"></span>
            </div>
        </div>

        <div class="success-actions">
            <a href="/student/dashboard" class="btn btn-primary" id="back-dashboard-btn">
                📋 Back to Dashboard
            </a>
            <a href="/" class="btn btn-secondary" id="go-home-btn">
                🏠 Home
            </a>
        </div>
    </div>
</div>

<script>
    // Show current time
    const now = new Date();
    document.getElementById('submit-time').textContent =
        now.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });

    // Particle animation
    (function() {
        const container = document.getElementById('particles');
        const colors = ['#10b981', '#6366f1', '#8b5cf6', '#f59e0b', '#3b82f6', '#34d399'];
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.width = (4 + Math.random() * 6) + 'px';
            p.style.height = p.style.width;
            p.style.animationDuration = (2 + Math.random() * 3) + 's';
            p.style.animationDelay = (Math.random() * 2) + 's';
            container.appendChild(p);
        }
    })();
</script>

<div class="developer-tag">
    <span>Developed by</span> <strong>ASHLABS</strong>
</div>
</body>
</html>
